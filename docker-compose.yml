version: '3.8'

services:
  backend:
    build: ./backend
    container_name: social_backend
    ports:
      - "8000:8000"
    volumes:
      # Persist the SQLite database outside the container
      - ./backend/social.db:/app/social.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: social_frontend
    environment:
      # Tell the frontend to talk to the backend container over Docker's internal network
      - API_URL=http://backend:8000
    ports:
      - "8080:8080"
    depends_on:
      - backend
    restart: unless-stopped
